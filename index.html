<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Game Zone</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }
    h1 {
      margin-top: 20px;
    }
    .game-btn {
      display: block;
      margin: 15px auto;
      padding: 15px;
      width: 200px;
      background: #00ffcc;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }
    canvas {
      background: black;
      margin-top: 20px;
    }
  </style>
</head>
<body><h1>🎮 My Game Website</h1><a class="game-btn" href="#" onclick="startGame('snake')">Play Snake Game</a> <a class="game-btn" href="#" onclick="startGame('click')">Play Click Game</a>

<canvas id="gameCanvas" width="300" height="300"></canvas>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");
let gameType = "";

function startGame(type) {
  gameType = type;
  if(type === 'snake') startSnake();
  if(type === 'click') startClick();
}

// ===== Snake Game =====
let snake, food, dx, dy;
function startSnake() {
  snake = [{x:150, y:150}];
  food = {x: Math.random()*300, y: Math.random()*300};
  dx = 10; dy = 0;
  document.onkeydown = changeDir;
  setInterval(drawSnake, 100);
}

function drawSnake() {
  ctx.clearRect(0,0,300,300);

  snake.unshift({x: snake[0].x + dx, y: snake[0].y + dy});

  if(Math.abs(snake[0].x - food.x) < 10 && Math.abs(snake[0].y - food.y) < 10){
    food = {x: Math.random()*300, y: Math.random()*300};
  } else {
    snake.pop();
  }

  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, 10, 10);

  ctx.fillStyle = "lime";
  snake.forEach(part => ctx.fillRect(part.x, part.y, 10, 10));
}

function changeDir(e) {
  if(e.key === "ArrowUp") {dx=0; dy=-10}
  if(e.key === "ArrowDown") {dx=0; dy=10}
  if(e.key === "ArrowLeft") {dx=-10; dy=0}
  if(e.key === "ArrowRight") {dx=10; dy=0}
}

// ===== Click Game =====
function startClick() {
  let score = 0;
  canvas.onclick = function() {
    score++;
    alert("Score: " + score);
  }
}

</script></body>
</html>
