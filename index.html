<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Game Zone</title><style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;text-align:center}
h1{padding:10px}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;padding:10px}
.card{background:#1e293b;padding:15px;border-radius:10px;cursor:pointer}
canvas{background:black;margin-top:10px;border-radius:10px}
button{padding:10px;border:none;border-radius:8px;margin:5px}
</style></head><body>
<h1>🔥 Ultimate Game Zone</h1><div class="container">
<div class="card" onclick="snake()">🐍 Snake</div>
<div class="card" onclick="clickG()">🖱️ Click</div>
<div class="card" onclick="guess()">🎯 Guess</div>
<div class="card" onclick="tic()">❌⭕ TicTacToe</div>
<div class="card" onclick="memory()">🧠 Memory</div>
</div><canvas id="c" width="300" height="300"></canvas>

<div id="ui"></div><script>
let c=document.getElementById("c"),ctx=c.getContext("2d"),loop,high=localStorage.getItem("high")||0;

function reset(){clearInterval(loop);c.onclick=null;document.getElementById("ui").innerHTML="<p>🏆 High Score: "+high+"</p>"}

// SNAKE
function snake(){reset();let s=[{x:150,y:150}],dx=10,dy=0,f={x:100,y:100},score=0;
document.getElementById("ui").innerHTML+=`<div>
<button onclick="dir(0,-10)">⬆️</button><br>
<button onclick="dir(-10,0)">⬅️</button>
<button onclick="dir(10,0)">➡️</button><br>
<button onclick="dir(0,10)">⬇️</button></div>`;
window.dir=(x,y)=>{dx=x;dy=y};
loop=setInterval(()=>{
ctx.clearRect(0,0,300,300);
s.unshift({x:s[0].x+dx,y:s[0].y+dy});
if(Math.abs(s[0].x-f.x)<10&&Math.abs(s[0].y-f.y)<10){score++;f={x:Math.random()*280,y:Math.random()*280}}else{s.pop()}
ctx.fillStyle="red";ctx.fillRect(f.x,f.y,10,10);
ctx.fillStyle="lime";s.forEach(p=>ctx.fillRect(p.x,p.y,10,10));
document.getElementById("ui").innerHTML="Score: "+score;
if(score>high){high=score;localStorage.setItem("high",high)}
},100)}

// CLICK
function clickG(){reset();let s=0;c.onclick=()=>{s++;if(s>high){high=s;localStorage.setItem("high",high)}document.getElementById("ui").innerHTML="Score: "+s}}

// GUESS
function guess(){reset();let n=Math.floor(Math.random()*10)+1;
document.getElementById("ui").innerHTML=`<input id="g"><button onclick="chk(${n})">Check</button><p id="r"></p>`;
window.chk=(num)=>{let v=document.getElementById("g").value;document.getElementById("r").innerText=(v==num)?"🎉 Win":"❌"}
}

// TIC
function tic(){reset();let b=["","","","","","","","",""],t="X";
document.getElementById("ui").innerHTML="<div id='bd' style='display:grid;grid-template-columns:repeat(3,80px);gap:5px;justify-content:center'></div><p id='r'></p>";
let bd=document.getElementById("bd");
for(let i=0;i<9;i++){let d=document.createElement("div");d.style="height:80px;background:#fff;color:#000;font-size:30px;display:flex;align-items:center;justify-content:center";
d.onclick=()=>{if(b[i]==""){b[i]=t;d.innerText=t;t=(t=="X")?"O":"X";win()}};bd.appendChild(d)}
function win(){let w=[[0,1,2],[3,4,5],[6,7,8],[0,4,8]];for(let c of w){if(b[c[0]]&&b[c[0]]==b[c[1]]&&b[c[1]]==b[c[2]]){document.getElementById("r").innerText=b[c[0]]+" Wins"}}}}

// MEMORY
function memory(){reset();let arr=[1,2,3,1,2,3].sort(()=>Math.random()-0.5),sel=[];
document.getElementById("ui").innerHTML="<div id='m' style='display:grid;grid-template-columns:repeat(3,80px);gap:5px;justify-content:center'></div>";
let m=document.getElementById("m");
arr.forEach((v,i)=>{let d=document.createElement("div");d.style="height:80px;background:#fff;color:#000;display:flex;align-items:center;justify-content:center";
d.onclick=()=>{d.innerText=v;sel.push({v,i,d});if(sel.length==2){setTimeout(()=>{
if(sel[0].v!=sel[1].v){sel[0].d.innerText="";sel[1].d.innerText=""}
sel=[]},500)}};m.appendChild(d)})}

</script><!-- MULTIPLAYER (Realtime using simple Firebase) --><script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script><script>
// 🔥 Replace with your Firebase config
var firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "",
  messagingSenderId: "",
  appId: ""
};
firebase.initializeApp(firebaseConfig);
let db = firebase.database();

// Multiplayer TicTacToe
function multiplayer(){
  reset();
  let room = prompt("Enter Room ID (same for both players)");
  let player = prompt("Enter X or O");

  document.getElementById("ui").innerHTML = "<div id='bd' style='display:grid;grid-template-columns:repeat(3,80px);gap:5px;justify-content:center'></div><p id='r'></p>";

  let bd = document.getElementById("bd");
  let cells = [];

  for(let i=0;i<9;i++){
    let d=document.createElement("div");
    d.style="height:80px;background:#fff;color:#000;font-size:30px;display:flex;align-items:center;justify-content:center";
    d.onclick=()=>{
      db.ref("rooms/"+room+"/board/"+i).set(player);
    };
    bd.appendChild(d);
    cells.push(d);
  }

  db.ref("rooms/"+room+"/board").on("value", snap=>{
    let data = snap.val() || [];
    data.forEach((v,i)=>{cells[i].innerText = v || ""});
  });
}
</script><div style="margin-top:10px">
<button onclick="multiplayer()">🌍 Multiplayer TicTacToe</button>
</div></body>
</html>
